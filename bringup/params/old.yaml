    #   cost_scaling_factor: 0.25      # 膨張コスト倍率
    #                                 # ローカルは緩めでOK（動的回避重視）
    #   inflation_radius: 0.25        # 膨張半径(m)
                                     # ローカルは小さめ（機敏な回避）

