    # footprint: "[[0.16, 0.0], [0.15, 0.05], [0.13, 0.10], [0.10, 0.13], [0.05, 0.15], [0.0, 0.16], [-0.05, 0.15], [-0.10, 0.13], [-0.13, 0.10], [-0.15, 0.05], [-0.16, 0.0], [-0.15, -0.05], [-0.13, -0.10], [-0.10, -0.13], [-0.05, -0.15], [0.0, -0.16], [0.05, -0.15], [0.10, -0.13], [0.13, -0.10], [0.15, -0.05]]"
    # footprint: "[[0.19, 0.0], [0.0, 0.19], [-0.19, 0.0], [0.0, -0.19]]"
