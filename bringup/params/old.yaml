    # footprint: "[[0.10, 0.0], [0.0, 0.10], [-0.10, 0.0], [0.0, -0.10]]"  # さらに小さく

    footprint_padding: 0.02  # 高精度マップでは過剰なパディングは不要
    robot_radius: 0.20       # フットプリントと一致させる
    
    # 更新頻度（高精度マップ対応）
