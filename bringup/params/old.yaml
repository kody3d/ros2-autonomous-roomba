    # width: 10
    # height: 10
    
    # 障害物レイヤー共通設定
    obstacle_layer:
      enabled: True
      observation_sources: scan
      scan:
        topic: /scan
        max_obstacle_height: 2.0
        clearing: True
        marking: True
        data_type: "LaserScan"
        
    # 膨張レイヤー共通設定
    # inflation_layer:
    #   enabled: True
