global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0      # 更新頻度[Hz]（ローカルより低い）
      publish_frequency: 1.0     # 公開頻度[Hz]
      global_frame: map
      robot_base_frame: base_link
      use_sim_time: False
      robot_radius: 0.22
      resolution: 0.05
      track_unknown_space: true  # 未知領域を追跡するか
      
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0
          
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
        
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.55
        
      always_send_full_costmap: True



# ローカルコストマップ（軽量化）
local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: False
      update_frequency: 5.0         # 6.0→4.0（更新頻度削減）
      publish_frequency: 2.0        # 3.0→2.0（配信頻度削減）
      global_frame: odom
      robot_base_frame: base_link
      rolling_window: true
      width: 7                      # 4→3（コストマップサイズ縮小）
      height: 7                     # 4→3（コストマップサイズ縮小）
      resolution: 0.05              # 解像度はそのまま（ローカルは精度重要）
      plugins: ["obstacle_layer", "inflation_layer"]  # 使用するレイヤープラグイン
      robot_radius: 0.22         # ロボット半径[m]（Roombaは約0.22m）

      obstacle_layer:                               # 障害物レイヤー設定
        plugin: "nav2_costmap_2d::ObstacleLayer"    # 障害物レイヤープラグイン
        enabled: True                               # 有効化
        observation_sources: scan                   # 障害物データのソース
        scan:                                       # scanトピックの詳細
          topic: /scan                              # Lidarデータのトピック
          max_obstacle_height: 2.0                  # 障害物の最大高さ（m）
          clearing: True                            # レイで障害物をクリアする
          marking: True                             # レイで障害物をマークする
          data_type: "LaserScan"                    # データ型（LaserScanを使用）
          raytrace_max_range: 3.0                   # レイの最大長（m）
          raytrace_min_range: 0.0                   # レイの最小長（m）
          obstacle_max_range: 2.5                   # 障害物の最大検知距離（m）
          obstacle_min_range: 0.0                   # 障害物の最小検知距離（m）
          
      plugins: ["voxel_layer", "inflation_layer"]
      
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0   # コストスケーリング係数
        inflation_radius: 0.60     # インフレーション半径[m]
        # 値を大きくすると: 障害物から遠ざかる、経路が保守的
        # 値を小さくすると: 障害物に近づく、経路が積極的
        
      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: True
        publish_voxel_map: True
        origin_z: 0.0
        z_resolution: 0.05
        z_voxels: 16
        max_obstacle_height: 2.0   # 最大障害物高さ[m]
        mark_threshold: 0
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 3.0  # レイトレース最大範囲[m]
          raytrace_min_range: 0.0  # レイトレース最小範囲[m]
          obstacle_max_range: 2.5  # 障害物検出最大範囲[m]
          obstacle_min_range: 0.0  # 障害物検出最小範囲[m]
          
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
        
      always_send_full_costmap: True
      # inflation_layer:
      #   plugin: "nav2_costmap_2d::InflationLayer"
      #   cost_scaling_factor: 1.5      # 1.0（急激なコスト変化）
      #                                # ローカルは緩めでOK（動的回避重視）
      #   inflation_radius: 0.20      # 膨張半径(m)  
      #                                 # 大きく→安全マージン大、通れない     
      #                                 # 小さく→ギリギリ通行、接触リスク
      #                                 # ロボット半径×1.5-3.0
      #                                # ローカルは小さめ（機敏な回避）
      #   inflate_unknown: false        # 未知領域膨張
      #   inflate_around_unknown: false # 未知領域周辺膨張

# コントローラー設定（軽量化）
controller_server:
  ros__parameters:
    use_sim_time: False
    # controller_frequency: 8.0       # 10.0→8.0（制御頻度削減）
    # min_x_velocity_threshold: 0.001
    # min_y_velocity_threshold: 0.001
    # min_theta_velocity_threshold: 0.001
    # progress_checker_plugins: ["progress_checker"]
    # goal_checker_plugins: ["general_goal_checker"]
    # controller_plugins: ["FollowPath"]
    
    controller_frequency: 20.0  # コントローラ更新頻度[Hz]
    # 値を大きくすると: より滑らかな制御、計算負荷増加
    # 値を小さくすると: 制御応答性低下、計算負荷軽減
    
    min_x_velocity_threshold: 0.001  # 最小前進速度[m/s]
    min_y_velocity_threshold: 0.5    # 最小横移動速度[m/s]（差動駆動では不使用）
    min_theta_velocity_threshold: 0.001  # 最小回転速度[rad/s]
    
    failure_tolerance: 0.3  # 経路追従失敗許容値[m]
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]
    # controller_plugins: ["FollowPath"]
    

    # # 進行状況チェッカーの設定
    # progress_checker:
    #   plugin: "nav2_controller::SimpleProgressChecker"
    #   required_movement_radius: 0.1   # 0.2→0.1（進行状況チェック緩和）
    #   movement_time_allowance: 15.0   # より長い許容時間
    
    # general_goal_checker:
    #   plugin: "nav2_controller::SimpleGoalChecker"
    #   xy_goal_tolerance: 0.15         # ゴール許容範囲
    #   yaw_goal_tolerance: 0.25        # 角度許容範囲
    #   stateful: True
    
    # FollowPath:
    #   plugin: "dwb_core::DWBLocalPlanner"
    #   debug_trajectory_details: False  # True→False（デバッグ無効化）
    #   min_vel_x: 0.0
    #   min_vel_y: 0.0
    #   max_vel_x: 0.18               # より慎重な速度設定
    #   max_vel_y: 0.0
    #   max_vel_theta: 0.15            # より慎重な回転速度
    #   min_speed_xy: 0.0
    #   max_speed_xy: 0.26
    #   min_speed_theta: 0.0
    #   acc_lim_x: 2.0
    #   acc_lim_y: 0.0
    #   acc_lim_theta: 1.6
    #   decel_lim_x: -2.5
    #   decel_lim_y: 0.0
    #   decel_lim_theta: -1.6
    #   vx_samples: 8                    # 6→8（前進選択肢増加）
    #   vy_samples: 0
    #   vtheta_samples: 20               # 12→20（回転選択肢増加）
    #   sim_time: 1.5                    # 1.0→1.5（長期予測）
    #   linear_granularity: 0.06      # 0.04→0.06（粗い粒度）
    #   angular_granularity: 0.035    # 0.025→0.035（粗い粒度）
    #   transform_tolerance: 0.5
    #   xy_goal_tolerance: 0.15       # 0.25→0.15（5cm精度活用）
    #   trans_stopped_velocity: 0.10 # 0.05→0.10（停止判定緩和）
    #   short_circuit_trajectory_evaluation: True
    #   stateful: True

    controller_plugins: ["FollowPath"]
    
    # Regulated Pure Pursuit Controller（Roombaに適した制御器）
    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 0.19      # 希望線速度[m/s]（Roombaの最大速度を考慮）
      lookahead_dist: 0.6          # 前方注視距離[m]
      # 値を大きくすると: より直線的な経路、大回り傾向
      # 値を小さくすると: より曲がった経路追従、振動的になりやすい
      
      min_lookahead_dist: 0.3      # 最小前方注視距離[m]
      max_lookahead_dist: 0.9      # 最大前方注視距離[m]
      
      lookahead_time: 1.5          # 前方注視時間[秒]
      rotate_to_heading_angular_vel: 0.8  # ヘディング回転角速度[rad/s]
      transform_tolerance: 0.1     # 変換許容値[秒]
      
      use_velocity_scaled_lookahead_dist: false  # 速度スケール前方注視を使用するか
      min_approach_linear_velocity: 0.05         # 接近時最小線速度[m/s]
      approach_velocity_scaling_dist: 0.6        # 接近速度スケール距離[m]
      
      use_collision_detection: true  # 衝突検出を使用するか
      max_allowed_time_to_collision_up_to_carrot: 1.0  # 衝突までの最大許容時間[秒]
      
      use_regulated_linear_velocity_scaling: true  # 規制線速度スケーリング使用
      use_cost_regulated_linear_velocity_scaling: false  # コスト規制線速度スケーリング
      regulated_linear_scaling_min_radius: 0.9          # 規制線速度スケーリング最小半径[m]
      regulated_linear_scaling_min_speed: 0.25          # 規制線速度スケーリング最小速度[m/s]
      
      use_rotate_to_heading: true   # ヘディング回転を使用するか
      rotate_to_heading_min_angle: 0.785  # ヘディング回転最小角度[rad]（約45度）
      max_angular_accel: 3.0       # 3.2最大角加速度[rad/s²]
      max_robot_pose_search_dist: 10.0  # ロボット姿勢検索最大距離[m]
      
    # Goal Checker
    general_goal_checker:
      stateful: True
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25     # XY位置許容値[m]
      yaw_goal_tolerance: 0.25    # ヨー角許容値[rad]
      # 値を大きくすると: ゴール到達判定が緩い、精度低下
      # 値を小さくすると: ゴール到達判定が厳しい、到達困難

    # Progress Checker
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5  # 進捗確認に必要な移動半径[m]
      movement_time_allowance: 10.0  # 移動時間許容値[秒]

#       critics: [ "GoalDist", "ObstacleFootprint"]  # criticsを削減
#       # "ObstacleFootprint",  "PathDist" を削除して軽量化

#       # PathAlign, PathDist, GoalAlign を削除して軽量化
#       FollowPath:

#         ObstacleFootprint:
#           cost_scaling_factor: 2.0        # シンプルな重み
# # 高い値（5.0以上）：障害物回避を最優先 → 狭い場所で動けなくなる
# # 適度な値（2.0-4.0）：安全性と機動性のバランス
# # 低い値（1.0以下）：障害物に接近してでも前進 → 危険
#           sum_scores: true  #           # スコア合計方式
        
#         GoalDist:
#           cost_scaling_factor: 10.0       # ゴール重視

#         # PathAlign:
#         #   cost_scaling_factor: 10.0   # パス追従重視
#         #   forward_point_distance: 0.3
#           # aggregation_type: "sum"

# プランナーサーバー設定（軽量化）
planner_server:
  ros__parameters:
    expected_planner_frequency: 20.0  # org版採用
    use_sim_time: False
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.5                 # 0.5→0.8（org版：より緩い）
      use_astar: false               # 現在と同じ
      allow_unknown: true            # false→true（org版：探索的）

smoother_server:
  ros__parameters:
    use_sim_time: False
    smoother_plugins: ["simple_smoother"]
    
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10       # 平滑化許容値
      max_its: 1000           # 最大反復回数
      do_refinement: True     # 細分化実行
      # 値を大きくすると: より多くの平滑化、計算時間増加
      # 値を小さくすると: 平滑化程度低下、計算時間短縮


behavior_server:
  ros__parameters:
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0     # 動作頻度[Hz]
    behavior_plugins: ["spin", "backup", "drive_on_heading", "assisted_teleop", "wait"]
    
    spin:
      plugin: "nav2_behaviors/Spin"
      simulate_ahead_time: 2.0  # 事前シミュレーション時間[秒]
      max_rotational_vel: 1.0   # 最大回転速度[rad/s]
      min_rotational_vel: 0.4   # 最小回転速度[rad/s]
      rotational_acc_lim: 3.2   # 回転加速度制限[rad/s²]
      
    backup:
      plugin: "nav2_behaviors/BackUp"
      simulate_ahead_time: 2.0
      backup_speed: -0.025      # バックアップ速度[m/s]
      backup_time: 2.0          # バックアップ時間[秒]
      
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
      simulate_ahead_time: 2.0
      speed: 0.025              # 直進速度[m/s]
      time: 1.0                 # 直進時間[秒]
      
    assisted_teleop:
      plugin: "nav2_behaviors/AssistedTeleop"
      simulate_ahead_time: 2.0
      projection_time: 5.0      # 投影時間[秒]
      simulation_time_step: 0.1 # シミュレーション時間ステップ[秒]
      
    wait:
      plugin: "nav2_behaviors/Wait"

robot_state_publisher:
  ros__parameters:
    use_sim_time: False

waypoint_follower:
  ros__parameters:
    use_sim_time: False
    loop_rate: 20             # ループレート[Hz]
    stop_on_failure: false    # 失敗時停止
    waypoint_task_executor_plugin: "wait_at_waypoint"
    
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: True
      waypoint_pause_duration: 200  # ウェイポイント停止時間[ms]

velocity_smoother:
  ros__parameters:
    use_sim_time: False
    smoothing_frequency: 20.0  # 平滑化頻度[Hz]
    scale_velocities: false    # 速度スケーリング
    feedback: "OPEN_LOOP"      # フィードバックタイプ
    
    max_velocity: [0.26, 0.0, 1.0]      # 最大速度[m/s, m/s, rad/s]
    min_velocity: [-0.26, 0.0, -1.0]    # 最小速度[m/s, m/s, rad/s]
    max_accel: [2.5, 0.0, 3.2]          # 最大加速度[m/s², m/s², rad/s²]
    max_decel: [-2.5, 0.0, -3.2]        # 最大減速度[m/s², m/s², rad/s²]
    # Roombaの性能に合わせた制限値
    # 値を大きくすると: より機敏な動作、モーター負荷増加
    # 値を小さくすると: より滑らかな動作、応答性低下
    
    odom_topic: "odom"
    odom_duration: 0.1         # オドメトリ継続時間[秒]
    deadband_velocity: [0.0, 0.0, 0.0]  # 不感帯速度
    velocity_timeout: 1.0      # 速度タイムアウト[秒]

collision_monitor:
  ros__parameters:
    use_sim_time: False
    base_frame_id: "base_link"
    odom_frame_id: "odom"
    cmd_vel_in_topic: "cmd_vel_smoothed"
    cmd_vel_out_topic: "cmd_vel"
    state_topic: "collision_monitor_state"
    transform_tolerance: 0.2   # 変換許容値[秒]
    source_timeout: 4.0        # ソースタイムアウト[秒]
    base_shift_correction: True
    
    polygons: ["PolygonStop", "PolygonSlow"]
    observation_sources: ["scan"]
    
    PolygonStop:
      type: "polygon"
      action_type: "stop"      # 停止アクション
      footprint_topic: "local_costmap/published_footprint"
      time_before_collision: 1.2  # 衝突前時間[秒]
      simulation_time_step: 0.1   # シミュレーション時間ステップ[秒]
      min_points: 6            # 最小ポイント数
      visualize: True          # 可視化
      polygon_pub_topic: "polygon_stop"
      
    PolygonSlow:
      type: "polygon"
      action_type: "slowdown"  # 減速アクション
      footprint_topic: "local_costmap/published_footprint"
      time_before_collision: 2.0  # 衝突前時間[秒]
      simulation_time_step: 0.1
      min_points: 6
      slowdown_ratio: 0.3      # 減速比率
      visualize: True
      polygon_pub_topic: "polygon_slowdown"
      
    scan:
      type: "scan"
      topic: "scan"
      min_height: 0.05         # 最小高さ[m]
      max_height: 2.0          # 最大高さ[m]
      min_range: 0.0           # 最小範囲[m]
      max_range: 3.0           # 最大範囲[m]
      obstacles_angle: 1.57    # 障害物角度[rad]（約90度）

# ライフサイクル管理
lifecycle_manager:
  ros__parameters:
    use_sim_time: False
    autostart: true           # 自動スタート
    node_names: ['controller_server', 'smoother_server', 'planner_server', 
                 'behavior_server', 'bt_navigator', 'waypoint_follower', 
                 'velocity_smoother', 'collision_monitor']
    # 全ナビゲーション関連ノードのライフサイクルを管理

lifecycle_manager_slam:
  ros__parameters:
    use_sim_time: False
    autostart: true
    node_names: ['map_saver']  # SLAM関連ノードの管理

lifecycle_manager_localization:
  ros__parameters:
    use_sim_time: False
    autostart: true
    node_names: ['map_server', 'amcl']  # 自己位置推定関連ノードの管理




