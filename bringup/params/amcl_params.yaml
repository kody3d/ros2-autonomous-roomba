# マップサーバー設定
map_server:
  ros__parameters:
    yaml_filename: "/home/mkouda/map.yaml"
    use_sim_time: false
    topic_name: "map"
    frame_id: "map"
    save_map_timeout: 5.0      # マップ保存タイムアウト[秒]
    free_thresh_default: 0.25  # 自由空間閾値
    occupied_thresh_default: 0.65  # 占有空間閾