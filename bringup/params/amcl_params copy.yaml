amcl:
  ros__parameters:
    use_sim_time: false
    
    # TF設定（重要）
    tf_broadcast: true              # TF配信を有効化（必須）
    tf_buffer_duration: 10.0        # TFバッファ保持時間(秒)
                                   # デフォルト10秒、遅延環境では延長
                                   # 長く→古いデータも参照可能、メモリ増
                                   # 短く→軽量、データ不足エラー増
    
    # Transform設定の詳細
    transform_tolerance: 0.15       # TF変換許容遅延(秒)
                                   # 小さく→厳密、エラー多発
                                   # 大きく→緩い、古いデータ許容
                                   # Raspberry Piでは0.15-0.3推奨
    
    # オドメトリノイズモデル（Raspberry Pi向け軽量化維持）
    alpha1: 0.1                     # 回転時の回転ノイズ
    alpha2: 0.1                     # 回転時の並進ノイズ  
    alpha3: 0.1                     # 並進時の並進ノイズ
    alpha4: 0.1                     # 並進時の回転ノイズ
    alpha5: 0.1                     # 並進時の回転ノイズ（非ホロノミック）
    
    # パーティクル設定（軽量化）
    laser_max_beams: 180            # 360→180（計算負荷軽減）
    min_particles: 100              # 200→100（パーティクル数削減）
    max_particles: 500              # 1000→500（パーティクル数削減）
    
    # 更新頻度設定（軽量化）
    update_min_d: 0.1               # 移動距離閾値(m)
    update_min_a: 0.15              # 0.1→0.15（回転角度閾値rad）
    resample_interval: 3            # 2→3（リサンプル頻度を下げる）
    
    # リカバリー設定
    recovery_alpha_slow: 0.001      # スロー平均フィルタ
    recovery_alpha_fast: 0.1        # ファスト平均フィルタ
    
    # フレーム設定
    global_frame_id: "map"
    odom_frame_id: "odom"  
    base_frame_id: "base_link"
    
    # レーザー設定
    laser_model_type: "likelihood_field"  # beam_modelより軽量
    laser_likelihood_max_dist: 2.0  # 尤度計算最大距離(m)
    laser_sigma_hit: 0.2            # ヒット時の標準偏差
    laser_z_hit: 0.5                # ヒット重み
    laser_z_short: 0.05             # ショート重み
    laser_z_max: 0.05               # 最大距離重み
    laser_z_rand: 0.5               # ランダム重み
    
    # 初期位置設定（ルンバ用）
    always_reset_initial_pose: false
    initial_pose_x: 0.0
    initial_pose_y: 0.0
    initial_pose_a: 0.0
    initial_pose_xx: 0.3            # 初期位置分散(m)
    initial_pose_yy: 0.3            # 初期位置分散(m)
    initial_pose_aa: 0.15           # 初期角度分散(rad)
    
    # 追加のTF関連設定
    save_pose_rate: 5.0             # 位置保存頻度(Hz)
    first_map_only: false           # 最初のマップのみ使用
    max_beams: 60                   # 使用するレーザービーム数上限
    pf_err: 0.05                    # パーティクルフィルタエラー閾値
    pf_z: 0.99                      # パーティクルフィルタ信頼度

# マップサーバー設定
map_server:
  ros__parameters:
    yaml_filename: "/home/mkouda/map.yaml"
    use_sim_time: false
    topic_name: "map"
    frame_id: "map"

